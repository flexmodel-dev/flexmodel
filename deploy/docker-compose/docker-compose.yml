services:
  mysql:
    container_name: ${CONTAINER_NAME_PREFIX}-flexmodel-mysql
    image: mysql:8.0
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/my.cnf
    restart: always
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - TZ=GMT+08
    command: >
      bash -c "
      chmod 644 /etc/my.cnf
      && /entrypoint.sh mysqld
      "
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
    networks:
      - flexmodel
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
  flexmodel-ui:
    container_name: ${CONTAINER_NAME_PREFIX}-flexmodel-ui
    image: cjbi/flexmodel-ui:latest
    restart: always
    environment:
      - TZ=GMT+08
    depends_on:
      flexmodel-server:
        condition: service_started
    networks:
      - flexmodel
  nginx:
    container_name: ${CONTAINER_NAME_PREFIX}-flexmodel-nginx
    image: nginx:1.25.3
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    restart: always
    ports:
      - ${NGINX_HTTP_PORT:-80}:80
      - ${NGINX_HTTPS_PORT:-443}:443
    environment:
      - TZ=GMT+08
    depends_on:
      flexmodel-server:
        condition: service_started
    networks:
      - flexmodel
  flexmodel-server:
    container_name: ${CONTAINER_NAME_PREFIX}-flexmodel-server
    image: ${FLEXMODEL_SERVER_IMAGE:-cjbi/flexmodel-server-native:latest}
    restart: always
    volumes:
      - ./storage:/deployments/storage
      - ./database:/deployments/database
      - ./logs/flexmodel-server:/deployments/logs
    environment:
      - TZ=GMT+08
      - FLEXMODEL_DATASOURCE_DB_KIND=mysql
      - FLEXMODEL_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      - FLEXMODEL_DATASOURCE_USERNAME=root
      - FLEXMODEL_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - FLEXMODEL_PROJECT_URL_TEMPLATE=jdbc:mysql://mysql:3306/{{databaseName}}
      - FLEXMODEL_DATASOURCE_DEV_TEST_DB_KIND=sqlite
      - FLEXMODEL_DATASOURCE_DEV_TEST_URL=jdbc:sqlite:file:database/sqlite_dev_test.db
      - QUARKUS_REST_CLIENT_FUNCTION_RUNTIME_URL=http://flexmodel-functions-runtime:9999
      - QUARKUS_HTTP_LIMITS_MAX_BODY_SIZE=100M

    networks:
      - flexmodel
    depends_on:
      mysql:
        condition: service_healthy

  flexmodel-functions-runtime:
    container_name: ${CONTAINER_NAME_PREFIX}-flexmodel-functions-runtime
    image: cjbi/flexmodel-functions-runtime:latest
    restart: always
    environment:
      - FLEXMODEL_JAVA_HOST=flexmodel-server
      - FLEXMODEL_JAVA_PORT=8080
      - FLEXMODEL_PORT=9999
      - FLEXMODEL_HOST=0.0.0.0
    networks:
      - flexmodel
    depends_on:
      - flexmodel-server
networks:
  flexmodel:
    name: ${CONTAINER_NAME_PREFIX}_flexmodel_default
    driver: bridge
