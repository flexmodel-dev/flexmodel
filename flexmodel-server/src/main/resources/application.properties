quarkus.analytics.disabled=true
quarkus.swagger-ui.always-include=true
flexmodel.datasource.db-kind=sqlite
flexmodel.datasource.url=jdbc:sqlite:file:sqlite.db
flexmodel.project-url-template=jdbc:sqlite:file:{{databaseName}}.db
quarkus.rest.path=/api
quarkus.langchain4j.openai.chat-model.model-name=qwen-plus
quarkus.langchain4j.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
quarkus.langchain4j.openai.api-key=xxx
quarkus.log.category."dev.flexmodel".level=INFO
flexmodel.datasource.dev_test.db-kind=sqlite
flexmodel.datasource.dev_test.url=jdbc:sqlite:file:sqlite_dev_test.db
#quarkus.langchain4j.easy-rag.path=./docs
quarkus.langchain4j.easy-rag.reuse-embeddings.enabled=true
quarkus.langchain4j.openai.embedding-model.model-name=text-embedding-v1
quarkus.smallrye-openapi.path=/api/openapi

# MCP Server 配置
quarkus.mcp.server.http.path=/mcp

# MCP 独立日志文件
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/mcp.log
quarkus.log.file.level=DEBUG
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n
quarkus.log.category."dev.flexmodel.mcp".level=DEBUG
quarkus.log.category."dev.flexmodel.mcp".handlers=FILE
quarkus.log.category."dev.flexmodel.mcp".use-parent-handlers=false
