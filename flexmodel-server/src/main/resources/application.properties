quarkus.analytics.disabled=true
quarkus.swagger-ui.always-include=true
flexmodel.datasource.db-kind=sqlite
flexmodel.datasource.url=jdbc:sqlite:file:database/sqlite.db
flexmodel.project-url-template=jdbc:sqlite:file:database/{{databaseName}}.db
#quarkus.rest.path=/api
quarkus.http.root-path=/api
quarkus.log.category."dev.flexmodel".level=INFO
quarkus.smallrye-openapi.path=/api/openapi

# Functions Runtime (Deno) REST Client 配置
quarkus.rest-client.function-runtime.url=http://127.0.0.1:9999

# Storage Provider Configuration
# type: local (default) or s3
# flexmodel.storage.type=local
# flexmodel.storage.local-path=./storage
# flexmodel.storage.read-only=false
#
# S3 Configuration (uncomment to use S3)
# flexmodel.storage.type=s3
# flexmodel.storage.s3-access-key=your-access-key
# flexmodel.storage.s3-secret-key=your-secret-key
# flexmodel.storage.s3-bucket=flexmodel
# flexmodel.storage.s3-region=us-east-1
# flexmodel.storage.s3-endpoint=http://localhost:9000
# flexmodel.storage.s3-path-style=true

# Native Image Build Configuration
# 下列类含 static final SecureRandom/Random 字段，必须在运行时初始化，
# 否则 GraalVM 构建期会因 Random 实例进入 image heap 报错。
# - dev.flexmodel.auth.service.ApiKeyGenerator: API Key 生成器
# - org.apache.http.impl.auth.NTLMEngineImpl: AWS SDK S3 apache-client 传递依赖，
#   内部含 NTLM 认证用的 SecureRandom（项目未实际使用 NTLM，但类仍被静态分析扫描）
# 注意：Quarkus additional-build-args 用逗号分隔多个 native-image 参数，
# 因此参数值内的逗号需用反斜杠转义。
quarkus.native.additional-build-args=--initialize-at-run-time=dev.flexmodel.auth.service.ApiKeyGenerator,org.apache.http.impl.auth.NTLMEngineImpl
