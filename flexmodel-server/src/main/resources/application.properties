quarkus.analytics.disabled=true
quarkus.swagger-ui.always-include=true
# JWT Configuration
# 生产环境务必通过环境变量 FLEXMODEL_JWT_SECRET 设置强随机密钥，不要使用默认值
flexmodel.jwt.secret=storewebkey
flexmodel.jwt.access-token-lifetime=7d
flexmodel.jwt.refresh-token-lifetime=30d

flexmodel.datasource.db-kind=sqlite
flexmodel.datasource.url=jdbc:sqlite:file:database/sqlite.db
flexmodel.project-url-template=jdbc:sqlite:file:database/{{databaseName}}.db
#quarkus.rest.path=/api
quarkus.http.root-path=/api
quarkus.http.limits.max-body-size=100M
quarkus.log.category."dev.flexmodel".level=INFO
# File logging — daily rotation, retain 7 days
quarkus.log.file.enable=true
quarkus.log.file.path=logs/flexmodel.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
quarkus.log.file.rotation.max-backup-index=7
quarkus.smallrye-openapi.path=/api/openapi

# Functions Runtime (Deno) REST Client 配置
quarkus.rest-client.function-runtime.url=http://127.0.0.1:9999

# Storage Provider Configuration
# type: local (default) or s3
# flexmodel.storage.type=local
# flexmodel.storage.local-path=./storage
# flexmodel.storage.read-only=false
#
# S3 Configuration (uncomment flexmodel.storage.type=s3 and quarkus.s3.* to use S3)
# flexmodel.storage.type=s3
# flexmodel.storage.s3-bucket=flexmodel
#
# quarkus-amazon-s3 extension config (S3 connection params)
# 强制使用最轻量的 URL Connection 客户端，避免引入 apache-client
# （apache-client 含 NTLMEngineImpl，会导致 native image 构建报 SecureRandom 错误）
# 合法值: aws-crt | apache | url
quarkus.s3.sync-client.type=url
# quarkus.s3.aws.region=us-east-1
# quarkus.s3.aws.credentials.type=static
# quarkus.s3.aws.credentials.static-provider.access-key-id=your-access-key
# quarkus.s3.aws.credentials.static-provider.secret-access-key=your-secret-key
# quarkus.s3.endpoint-override=http://localhost:9000
# quarkus.s3.path-style-access=true

# Native Image Build Configuration
# graphql.util.IdGenerator 含 static Random 字段，需在运行时初始化。
quarkus.native.additional-build-args=\
  --initialize-at-run-time=graphql.util.IdGenerator
# Quartz 调度器配置（通过 Quarkus Quartz 扩展，自动处理 native-image 元数据）
quarkus.quartz.thread-count=5
quarkus.quartz.instance-name=FlexmodelScheduler
quarkus.quartz.properties."org.quartz.scheduler.rmi.export"=false
quarkus.quartz.properties."org.quartz.scheduler.rmi.proxy"=false
quarkus.quartz.properties."org.quartz.jobStore.class"=dev.flexmodel.scheduling.config.FmJobStore
quarkus.s3.devservices.enabled=false
flexmodel.datasource.dev_test.db-kind=sqlite
flexmodel.datasource.dev_test.url=jdbc:sqlite:file:database/sqlite_dev_test.db
